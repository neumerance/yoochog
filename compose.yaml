# Base: Socket.io realtime server (Dockerfile in realtime-server/).
# For local and non-prod use only; production on a dedicated host: docs/server-deployment.md.
# Use alone:  docker compose up --build
# Full dev:   docker compose -f compose.dev.yaml up --build

services:
  socket:
    build: ./realtime-server
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
