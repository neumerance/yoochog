# Example nginx site for yoochog on a dedicated host.
# Copy to /etc/nginx/sites-available/ (or conf.d/), adjust server_name and paths, then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: point to your existing certificate files (Let’s Encrypt typical layout shown in comments).

# WebSocket / long-polling upgrade (Socket.io)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name yoochoog.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yoochoog.app;

    # Must exist on disk before `nginx -t` passes (e.g. existing Let’s Encrypt):
    ssl_certificate     /etc/letsencrypt/live/yoochoog.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yoochoog.app/privkey.pem;

    # Match deploy.sh layout: DEPLOY_PATH/current → active release
    root /var/www/yoochog/current/app/dist;
    index index.html;

    # --- Default: app at site root (VITE_BASE_PATH=/) ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # If you instead build with VITE_BASE_PATH=/yoochog/ and want the same shape as GitHub Pages,
    # comment the "location /" block above and use something like:
    # location /yoochog/ {
    #     alias /var/www/yoochog/current/app/dist/;
    #     try_files $uri $uri/ /yoochog/index.html;
    # }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
