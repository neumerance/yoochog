# For /etc/nginx/sites-enabled/yoochoog.app (Debian/Ubuntu).
# Replace a Certbot placeholder root (/var/www/yoochoog.app/html) with the deploy output:
#   root /var/www/yoochog/current/app/dist
# `nginx -t && systemctl reload nginx` after install.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    server_name yoochoog.app www.yoochoog.app;

    ssl_certificate /etc/letsencrypt/live/yoochoog.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yoochoog.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/yoochog/current/app/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name yoochoog.app www.yoochoog.app;
    return 301 https://$host$request_uri;
}
