  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon.png">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Yoochog — YouTube jukebox &amp; karaoke</title>

    <meta
      name="description"
      content="Group karaoke and a shared YouTube jukebox: run the show on a TV or laptop, share the link, and let guests queue tracks from their phones—playback stays in sync."
    >
    <link rel="canonical" href="https://neumerance.github.io/yoochog/">
    <meta property="og:site_name" content="Yoochog">
    <meta property="og:title" content="Yoochog — YouTube jukebox &amp; karaoke">

      property="og:description"
      content="Group karaoke and a shared YouTube jukebox: run the show on a TV or laptop, share the link, and let guests queue tracks from their phones—playback stays in sync."
    >
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://neumerance.github.io/yoochog/">

    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">

    <meta name="twitter:title" content="Yoochog — YouTube jukebox &amp; karaoke">

      name="twitter:description"
      content="Group karaoke and a shared YouTube jukebox: run the show on a TV or laptop, share the link, and let guests queue tracks from their phones—playback stays in sync."

    <meta name="twitter:image" content="https://neumerance.github.io/yoochog/twitter-image.png">

    <meta name="twitter:image:height" content="600">
