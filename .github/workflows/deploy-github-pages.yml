# Build the Vue app in app/ and publish static output to GitHub Pages (artifact flow).
# Repository setting: Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install and build
        working-directory: app
        run: |
          npm ci
          npm run build

      - name: Verify GitHub Pages SPA fallback (404.html)
        run: test -f app/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
